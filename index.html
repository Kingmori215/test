<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃園冷凍冷藏溫度記錄表</title>

<style>
body {
  font-family: sans-serif;
  padding:20px;
  background:#f5f5f5;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2 { margin-top:0; }

.notice {
  background:＃FFFAF0;
  color:#000000;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  margin-bottom:15px;
  text-align:left;
}
  
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

/* 🔴 異常紅框 */
input.warning {
  border:2px solid red;
  background:#fff5f5;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  transition:0.2s;
}

button:active {
  transform: scale(0.96);
}

button.loading {
  background:#999;
}

button:disabled {
  opacity:0.6;
}

#msg {
  margin-top:15px;
}

.warning-text {
  color:red;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title">設備記錄</h2>



  <!-- 🔥 新增頻率文字 -->
  <div class="notice">
    頻率：每2小時及下班前記錄(9/11/13/15/17/18點)
  </div>

  
  <input id="temp" type="number" step="0.1" placeholder="請輸入溫度">
  <div id="alert" class="warning-text"></div>

  <input id="name" placeholder="請輸入姓名">
  <input id="remark" placeholder="備註(若有異常請填寫原因)">

  <button id="submitBtn" onclick="send()">送出</button>

  <p id="msg"></p>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxjpbolIcHrlSncp0Hg0E_PUbiUZcSagDUxeryMiOQmYJ1lll7kpTSUt70Z4fxMdmR2zQ/exec";

// 取得設備
function getDevice(){
  return new URLSearchParams(window.location.search).get("device");
}

const device = getDevice();
const tempInput = document.getElementById("temp");
const alertBox = document.getElementById("alert");

// 標題
document.getElementById("title").innerText =
  device ? device + " 溫度記錄" : "⚠️ 未指定設備";


// 🔥 異常判斷
tempInput.addEventListener("input", () => {

  const temp = parseFloat(tempInput.value);

  if(isNaN(temp)){
    alertBox.innerText = "";
    tempInput.classList.remove("warning");
    return;
  }

  if(device.includes("冷藏") && temp > 7){
    alertBox.innerText = "⚠️ 溫度過高（冷藏應 ≤ 7°C）";
    tempInput.classList.add("warning");
  }
  else if(device.includes("冷凍") && temp > -18){
    alertBox.innerText = "⚠️ 溫度過高（冷凍應 ≤ -18°C）";
    tempInput.classList.add("warning");
  }
  else if(device.includes("超低溫") && temp > -55){
    alertBox.innerText = "⚠️ 溫度過高（冷凍應 ≤ -55°C）";
    tempInput.classList.add("warning");
  }  
  else{
    alertBox.innerText = "";
    tempInput.classList.remove("warning");
  }
});


// 🔥 送出
function send(){

  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("msg");

  const temp = tempInput.value.trim();
  const name = document.getElementById("name").value.trim();
  const remark = document.getElementById("remark").value.trim();

  if(!device){
    msg.innerText = "❌ 沒有設備參數";
    return;
  }

  if(!temp){
    msg.innerText = "⚠️ 請輸入溫度";
    return;
  }

  if(!name){
    msg.innerText = "⚠️ 請輸入姓名";
    return;
  }

  // 🔴 異常強制備註
  const t = parseFloat(temp);
  if(
    (device.includes("冷藏") && t > 7) ||
    (device.includes("冷凍") && t > -18)
  ){
    if(!remark){
      msg.innerText = "⚠️ 異常請填寫備註";
      return;
    }
  }

  // UI 狀態
  btn.disabled = true;
  btn.classList.add("loading");
  btn.innerText = "送出中...";
  msg.innerText = "";

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "write",
      temp: temp,
      name: name,
      remark: remark,
      device: device
    })
  })
  .then(() => {

    // ✅ 完成畫面（取代關閉）
    document.body.innerHTML = `
      <div style="text-align:center;padding:40px;">
        <h2>✅ 已送出</h2>
        <p>可直接關閉此頁面</p>
      </div>
    `;
  })
  .catch(() => {
    msg.innerText = "❌ 寫入失敗";
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.innerText = "送出";
  });
}

</script>

</body>
</html>
